# Campagne — Calcul d'itinéraire entre deux villes
#
# Utilise l'API Géoplateforme IGN (data.geopf.fr) :
#   - Géocodage (search) : nom de ville → coordonnées lon,lat
#   - Navigation         : coordonnées → itinéraire (distance, durée)
#
# Aucune clé API requise.
#
# Usage :
#   terapi run examples/itineraire_demo.toml
#
# Personnalisation :
#   Modifier DEPART, ARRIVEE, PROFILE et OPTIMIZATION dans [env].

[campaign]
name        = "Itinéraire — Géoplateforme IGN"
description = "Géocode deux villes puis calcule l'itinéraire entre elles"

[[params]]
name        = "DEPART"
description = "Ville de départ"
default     = "Paris"

[[params]]
name        = "ARRIVEE"
description = "Ville d'arrivée"
default     = "Lyon"

[[params]]
name        = "PROFILE"
description = "car | pedestrian | cyclist"
default     = "car"

[[params]]
name        = "OPTIMIZATION"
description = "fastest | shortest"
default     = "fastest"

[env]
RESOURCE     = "bdtopo-valhalla"
GEOCODE_URL  = "https://data.geopf.fr/geocodage/search"
NAV_URL      = "https://data.geopf.fr/navigation/itineraire"
REVERSE_URL  = "https://data.geopf.fr/geocodage/reverse"

# ── Étape 1 : géocodage de la ville de départ ─────────────────────────────

[[steps]]
name   = "Géocodage départ"
method = "GET"
url    = "{{GEOCODE_URL}}?q={{DEPART}}&type=municipality&limit=1"

assert = [
  { on = "status",                        eq = 200  },
  { on = "body.features.0.geometry.type", eq = "Point" },
]

[steps.extract]
lon_depart  = "features.0.geometry.coordinates.0"
lat_depart  = "features.0.geometry.coordinates.1"
nom_depart  = "features.0.properties.name"

# ── Étape 2 : géocodage de la ville d'arrivée ─────────────────────────────

[[steps]]
name   = "Géocodage arrivée"
method = "GET"
url    = "{{GEOCODE_URL}}?q={{ARRIVEE}}&type=municipality&limit=1"

assert = [
  { on = "status",                        eq = 200  },
  { on = "body.features.0.geometry.type", eq = "Point" },
]

[steps.extract]
lon_arrivee = "features.0.geometry.coordinates.0"
lat_arrivee = "features.0.geometry.coordinates.1"
nom_arrivee = "features.0.properties.name"

# ── Étape 3 : composition des coordonnées au format "lon,lat" ─────────────

[[steps]]
name = "Composition coordonnées"
kind = "transform"
transforms = [
  { type = "template", input = "{{lon_depart}},{{lat_depart}}",   output = "COORD_START" },
  { type = "template", input = "{{lon_arrivee}},{{lat_arrivee}}", output = "COORD_END"   },
]

# ── Étape 4 : calcul de l'itinéraire ──────────────────────────────────────

[[steps]]
name   = "Calcul itinéraire"
method = "GET"
url    = "{{NAV_URL}}?resource={{RESOURCE}}&start={{COORD_START}}&end={{COORD_END}}&profile={{PROFILE}}&optimization={{OPTIMIZATION}}"

assert = [
  { on = "status",   eq     = 200 },
  { on = "body.distance", exists = true },
  { on = "body.duration", exists = true },
]

[steps.extract]
distance_m  = "distance"
duration_s  = "duration"
# Premier point [lon,lat] de chaque step de la route (34 étapes environ)
STEP_COORDS = "portions.0.steps.*.geometry.coordinates.0"

# ── Étape 5 : géocodage inverse de chaque point de passage ────────────────
# Nécessite le feature {{item_0}}/{{item_1}} (terapi ≥ 0.7.7) :
# chaque élément de STEP_COORDS est un tableau [lon, lat] ; item_0 = lon, item_1 = lat.

[[steps]]
name               = "Géocodage inverse"
foreach            = "{{STEP_COORDS}}"
continue_on_error  = true
method             = "GET"
url                = "{{REVERSE_URL}}?lon={{item_0}}&lat={{item_1}}"

assert = [
  { on = "status", eq = 200 },
  { on = "body.features.0.properties.label", exists = true },
]

# ── Sortie ────────────────────────────────────────────────────────────────
# Chaque enregistrement = propriétés de géocodage (label, city…)
#                         + métadonnées de route (nom_depart, nom_arrivee, distance_m, duration_s)

[[outputs]]
from_step    = "Géocodage inverse"
path         = "/tmp/itineraire_etapes.json"
select       = "features.0.properties"
include_vars = ["nom_depart", "nom_arrivee", "distance_m", "duration_s"]
