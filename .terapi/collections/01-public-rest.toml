[collection]
name        = "Public REST APIs"
description = "JSONPlaceholder, ReqRes, httpbin, PokeAPI, CoinGecko — tous publics"

# ── JSONPlaceholder ───────────────────────────────────────────────────────────
# Fake blog API : posts, comments, users. CRUD complet, status codes réalistes.

[[folders]]
name = "JSONPlaceholder"

[[folders.requests]]
name   = "List posts"
method = "GET"
url    = "https://jsonplaceholder.typicode.com/posts"

[[folders.requests]]
name   = "Get post"
method = "GET"
url    = "https://jsonplaceholder.typicode.com/posts/1"

[[folders.requests]]
name   = "Create post"
method = "POST"
url    = "https://jsonplaceholder.typicode.com/posts"
body   = """
{
  "title": "terapi test",
  "body": "Hello from terapi!",
  "userId": 1
}"""

[folders.requests.headers]
Content-Type = "application/json"

[[folders.requests]]
name   = "Update post"
method = "PUT"
url    = "https://jsonplaceholder.typicode.com/posts/1"
body   = """
{
  "id": 1,
  "title": "updated title",
  "body": "updated body",
  "userId": 1
}"""

[folders.requests.headers]
Content-Type = "application/json"

[[folders.requests]]
name   = "Patch post"
method = "PATCH"
url    = "https://jsonplaceholder.typicode.com/posts/1"
body   = '{"title": "patched title"}'

[folders.requests.headers]
Content-Type = "application/json"

[[folders.requests]]
name   = "Delete post"
method = "DELETE"
url    = "https://jsonplaceholder.typicode.com/posts/1"

[[folders.requests]]
name   = "Comments on post 1"
method = "GET"
url    = "https://jsonplaceholder.typicode.com/posts/1/comments"

[[folders.requests]]
name   = "List users"
method = "GET"
url    = "https://jsonplaceholder.typicode.com/users"

# ── ReqRes ────────────────────────────────────────────────────────────────────
# Auth simulée (login/register), pagination, gestion d'utilisateurs.
# Nécessite une clé gratuite : https://reqres.in/signup
# Placer la clé dans une variable d'env : REQRES_API_KEY

[[folders]]
name = "ReqRes"

[[folders.requests]]
name   = "Login (succès)"
method = "POST"
url    = "https://reqres.in/api/login"
body   = '{"email": "eve.holt@reqres.in", "password": "cityslicka"}'

[folders.requests.headers]
Content-Type = "application/json"
x-api-key    = "{{REQRES_API_KEY}}"

[[folders.requests]]
name   = "Login (échec — mot de passe manquant)"
method = "POST"
url    = "https://reqres.in/api/login"
body   = '{"email": "peter@klaven.com"}'

[folders.requests.headers]
Content-Type = "application/json"
x-api-key    = "{{REQRES_API_KEY}}"

[[folders.requests]]
name   = "Register (succès)"
method = "POST"
url    = "https://reqres.in/api/register"
body   = '{"email": "eve.holt@reqres.in", "password": "pistol"}'

[folders.requests.headers]
Content-Type = "application/json"
x-api-key    = "{{REQRES_API_KEY}}"

[[folders.requests]]
name   = "List users (page 2)"
method = "GET"
url    = "https://reqres.in/api/users?page=2"

[folders.requests.headers]
x-api-key = "{{REQRES_API_KEY}}"

[[folders.requests]]
name   = "Get user 2"
method = "GET"
url    = "https://reqres.in/api/users/2"

[folders.requests.headers]
x-api-key = "{{REQRES_API_KEY}}"

[[folders.requests]]
name   = "Create user"
method = "POST"
url    = "https://reqres.in/api/users"
body   = '{"name": "morpheus", "job": "leader"}'

[folders.requests.headers]
Content-Type = "application/json"
x-api-key    = "{{REQRES_API_KEY}}"

[[folders.requests]]
name   = "Update user (PUT)"
method = "PUT"
url    = "https://reqres.in/api/users/2"
body   = '{"name": "morpheus", "job": "zion resident"}'

[folders.requests.headers]
Content-Type = "application/json"
x-api-key    = "{{REQRES_API_KEY}}"

[[folders.requests]]
name   = "Delete user 2"
method = "DELETE"
url    = "https://reqres.in/api/users/2"

[folders.requests.headers]
x-api-key = "{{REQRES_API_KEY}}"

# ── httpbin ───────────────────────────────────────────────────────────────────
# Boîte à outils debug : forcer n'importe quel status code, inspecter les
# headers/body envoyés, simuler des délais.

[[folders]]
name = "httpbin — Debug"

[[folders.requests]]
name   = "Echo GET"
method = "GET"
url    = "https://httpbin.io/get?foo=bar&env={{ENV}}"

[[folders.requests]]
name   = "Echo POST body"
method = "POST"
url    = "https://httpbin.io/post"
body   = '{"message": "hello from terapi"}'

[folders.requests.headers]
Content-Type = "application/json"

[[folders.requests]]
name   = "Echo headers envoyés"
method = "GET"
url    = "https://httpbin.io/headers"

[folders.requests.headers]
X-Terapi-Test = "true"

[[folders.requests]]
name   = "Force 200"
method = "GET"
url    = "https://httpbin.io/status/200"

[[folders.requests]]
name   = "Force 201"
method = "GET"
url    = "https://httpbin.io/status/201"

[[folders.requests]]
name   = "Force 400"
method = "GET"
url    = "https://httpbin.io/status/400"

[[folders.requests]]
name   = "Force 401"
method = "GET"
url    = "https://httpbin.io/status/401"

[[folders.requests]]
name   = "Force 403"
method = "GET"
url    = "https://httpbin.io/status/403"

[[folders.requests]]
name   = "Force 404"
method = "GET"
url    = "https://httpbin.io/status/404"

[[folders.requests]]
name   = "Force 422"
method = "GET"
url    = "https://httpbin.io/status/422"

[[folders.requests]]
name   = "Force 500"
method = "GET"
url    = "https://httpbin.io/status/500"

[[folders.requests]]
name   = "Délai 2s (test timeout)"
method = "GET"
url    = "https://httpbin.io/delay/2"

[[folders.requests]]
name   = "Bearer auth echo"
method = "GET"
url    = "https://httpbin.io/bearer"

[folders.requests.headers]
Authorization = "Bearer {{TOKEN}}"

# ── PokeAPI ───────────────────────────────────────────────────────────────────
# JSON imbriqué complexe — parfait pour tester le JSON viewer (fold/unfold).

[[folders]]
name = "PokeAPI"

[[folders.requests]]
name   = "Pikachu"
method = "GET"
url    = "https://pokeapi.co/api/v2/pokemon/pikachu"

[[folders.requests]]
name   = "Charizard"
method = "GET"
url    = "https://pokeapi.co/api/v2/pokemon/charizard"

[[folders.requests]]
name   = "Bulbasaur"
method = "GET"
url    = "https://pokeapi.co/api/v2/pokemon/bulbasaur"

[[folders.requests]]
name   = "List abilities (20 premiers)"
method = "GET"
url    = "https://pokeapi.co/api/v2/ability?limit=20&offset=0"

# ── CoinGecko ─────────────────────────────────────────────────────────────────
# Données crypto en direct, rate-limiting, structures JSON financières.

[[folders]]
name = "CoinGecko"

[[folders.requests]]
name   = "Prix Bitcoin (USD/EUR)"
method = "GET"
url    = "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd,eur"

[[folders.requests]]
name   = "Top 10 par market cap"
method = "GET"
url    = "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1"

[[folders.requests]]
name   = "Détail Ethereum"
method = "GET"
url    = "https://api.coingecko.com/api/v3/coins/ethereum"

[[folders.requests]]
name   = "Ping API"
method = "GET"
url    = "https://api.coingecko.com/api/v3/ping"
