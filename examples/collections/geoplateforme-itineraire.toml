[collection]
name        = "Géoplateforme — Calcul d'itinéraire"
description = "Exploration de l'API Itinéraire IGN (data.geopf.fr). Tester dans l'ordre : géocodage → récupération des coordonnées → calcul d'itinéraire."

# ── Structure de la réponse itinéraire (confirmée) ────────────────────────
# distance      → mètres  (ex: 1099.38)   distanceUnit = "meter"
# duration      → secondes (ex: 272.843)  timeUnit     = "second"
# geometry      → LineString GeoJSON (tracé complet)
# portions.0.steps → tableau des virages avec instructions et noms de rues
#
# Pour [steps.extract] dans la campagne :
#   distance_m = "distance"
#   duration_s = "duration"
#
# Ressource confirmée : bdtopo-valhalla

# ── Dossier 1 : Géocodage ──────────────────────────────────────────────────
# Convertit un nom de ville en coordonnées lon,lat.
# Réponse GeoJSON :
#   features.0.geometry.coordinates.0 → longitude
#   features.0.geometry.coordinates.1 → latitude

[[folders]]
name = "Géocodage"

[[folders.requests]]
name        = "Recherche ville — Paris"
method      = "GET"
url         = "https://data.geopf.fr/geocodage/search?q=Paris&type=municipality&limit=1"
description = "Géocode 'Paris'. Coordonnées : features.0.geometry.coordinates → [lon, lat]. Attendu : ~[2.3488, 48.8534]"

[[folders.requests]]
name        = "Recherche ville — Lyon"
method      = "GET"
url         = "https://data.geopf.fr/geocodage/search?q=Lyon&type=municipality&limit=1"
description = "Géocode 'Lyon'. Attendu : ~[4.8357, 45.7640]"

[[folders.requests]]
name        = "Recherche ville — Bordeaux"
method      = "GET"
url         = "https://data.geopf.fr/geocodage/search?q=Bordeaux&type=municipality&limit=1"
description = "Géocode 'Bordeaux'. Attendu : ~[-0.5792, 44.8378]"

[[folders.requests]]
name        = "Recherche ville — Marseille"
method      = "GET"
url         = "https://data.geopf.fr/geocodage/search?q=Marseille&type=municipality&limit=1"
description = "Géocode 'Marseille'. Attendu : ~[5.3698, 43.2965]"

[[folders.requests]]
name        = "Recherche adresse"
method      = "GET"
url         = "https://data.geopf.fr/geocodage/search?q=20+avenue+de+Segur+Paris&limit=1"
description = "Géocode une adresse complète. Modifier q= pour tester."

[[folders.requests]]
name        = "Géocodage inverse"
method      = "GET"
url         = "https://data.geopf.fr/geocodage/reverse?lon=2.3088&lat=48.8738"
description = "Retourne l'adresse la plus proche d'un point GPS. Modifier lon= et lat=."

# ── Dossier 2 : Itinéraire — Voiture ──────────────────────────────────────
# resource=bdtopo-valhalla  (confirmé)
# start / end = lon,lat
# profile      = car / pedestrian / cyclist
# optimization = fastest / shortest
#
# Réponse : distance (m), duration (s), geometry, portions[].steps[]

[[folders]]
name = "Itinéraire — Voiture"

[[folders.requests]]
name        = "Paris → Lyon (plus rapide)"
method      = "GET"
url         = "https://data.geopf.fr/navigation/itineraire?resource=bdtopo-valhalla&start=2.3488,48.8534&end=4.8357,45.7640&profile=car&optimization=fastest"
description = "Itinéraire voiture Paris→Lyon optimisé temps. Extraire : distance (m) et duration (s) à la racine."

[[folders.requests]]
name        = "Paris → Lyon (plus court)"
method      = "GET"
url         = "https://data.geopf.fr/navigation/itineraire?resource=bdtopo-valhalla&start=2.3488,48.8534&end=4.8357,45.7640&profile=car&optimization=shortest"
description = "Même trajet, optimisé distance. Comparer distance et duration avec le plus rapide."

[[folders.requests]]
name        = "Paris → Bordeaux (plus rapide)"
method      = "GET"
url         = "https://data.geopf.fr/navigation/itineraire?resource=bdtopo-valhalla&start=2.3488,48.8534&end=-0.5792,44.8378&profile=car&optimization=fastest"
description = "Itinéraire Paris→Bordeaux."

[[folders.requests]]
name        = "Lyon → Marseille (plus rapide)"
method      = "GET"
url         = "https://data.geopf.fr/navigation/itineraire?resource=bdtopo-valhalla&start=4.8357,45.7640&end=5.3698,43.2965&profile=car&optimization=fastest"
description = "Itinéraire Lyon→Marseille."

# ── Dossier 3 : Itinéraire — Piéton ───────────────────────────────────────

[[folders]]
name = "Itinéraire — Piéton"

[[folders.requests]]
name        = "Louvre → Tour Eiffel (piéton)"
method      = "GET"
url         = "https://data.geopf.fr/navigation/itineraire?resource=bdtopo-valhalla&start=2.3364,48.8606&end=2.2945,48.8584&profile=pedestrian&optimization=fastest"
description = "Courte distance piéton dans Paris."

[[folders.requests]]
name        = "Lyon Bellecour → Fourvière (piéton)"
method      = "GET"
url         = "https://data.geopf.fr/navigation/itineraire?resource=bdtopo-valhalla&start=4.8320,45.7577&end=4.8220,45.7622&profile=pedestrian&optimization=fastest"
description = "Montée à pied vers la basilique de Fourvière."

# ── Dossier 4 : Itinéraire — Vélo ─────────────────────────────────────────

[[folders]]
name = "Itinéraire — Vélo"

[[folders.requests]]
name        = "Paris → Versailles (vélo)"
method      = "GET"
url         = "https://data.geopf.fr/navigation/itineraire?resource=bdtopo-valhalla&start=2.3488,48.8534&end=2.1301,48.8014&profile=cyclist&optimization=fastest"
description = "~20 km à vélo. Versailles : lon=2.1301, lat=48.8014"

# ── Dossier 5 : Exploration réponse ───────────────────────────────────────
# Structure confirmée de la réponse :
#   distance        → mètres   (float, racine)
#   duration        → secondes (float, racine)
#   distanceUnit    → "meter"
#   timeUnit        → "second"
#   geometry        → LineString GeoJSON
#   portions.0.steps → étapes détaillées avec noms de rues et instructions

[[folders]]
name = "Exploration réponse"

[[folders.requests]]
name        = "Itinéraire court — structure confirmée"
method      = "GET"
url         = "https://data.geopf.fr/navigation/itineraire?resource=bdtopo-valhalla&start=2.3364,48.8606&end=2.3400,48.8650&profile=car&optimization=fastest"
description = """Structure de la réponse confirmée (bdtopo-valhalla) :
  distance      = 1099.38  (mètres, racine)
  duration      = 272.843  (secondes, racine)
  distanceUnit  = \"meter\"
  timeUnit      = \"second\"
  portions.0.steps → tableau des virages (distance, duration, instruction.type, attributes.name)

Pour [steps.extract] dans la campagne :
  distance_m = \"distance\"
  duration_s = \"duration\""""

[[folders.requests]]
name        = "Ressources disponibles"
method      = "GET"
url         = "https://data.geopf.fr/navigation/resources"
description = "Lister les ressources disponibles pour l'API navigation."
