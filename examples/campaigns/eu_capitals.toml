# EU Countries — capitals, language & weather
#
# Pipeline complet sans clé API :
#
#   Seed     → GraphQL Countries : liste des 53 pays EU
#              (code, name, capital, emoji, languages)
#   Transform → regex : extrait la première langue officielle
#   HTTP     → Open-Meteo Geocoding : lat/lon de la capitale
#   HTTP     → Open-Meteo Weather   : météo actuelle (temp, vent, code WMO)
#   Output   → /tmp/eu_capitals_weather.json
#
# Pour tester :
#   terapi run examples/eu_capitals.toml
#
# Variables disponibles en cours de pipeline :
#   {{code}}             — code ISO du pays       (ex. FR)
#   {{name}}             — nom du pays            (ex. France)
#   {{capital}}          — capitale               (ex. Paris)
#   {{emoji}}            — drapeau                (ex. 🇫🇷)
#   {{primary_language}} — première langue off.   (ex. French)      [après transform]
#   {{lat}} {{lon}}      — coordonnées capitale   (ex. 48.85/2.35)  [après géocode]
#   {{temperature}}      — °C courant             (ex. 17.4)        [après météo]
#   {{wind_speed}}       — km/h                   (ex. 12.3)        [après météo]
#   {{weather_code}}     — code WMO               (ex. 3)           [après météo]

continue_on_error = true   # micro-états avec capitales ambiguës (Guernsey, San Marino)

[campaign]
name        = "EU Countries — capitals, language & weather"
description = "GraphQL seed → langue officielle → géocodage → météo actuelle. Open-Meteo uniquement, sans clé API."

# ── Connecteur ────────────────────────────────────────────────────────────────

[[connectors]]
type      = "json"
from_step = "EU countries"
select    = "data.continent.countries"

# ── Step 1 — seed ─────────────────────────────────────────────────────────────

[[steps]]
name   = "EU countries"
kind   = "seed"
method = "POST"
url    = "https://countries.trevorblades.com/graphql"
body   = '{"query":"{ continent(code: \"EU\") { countries { code name capital emoji languages { name } } } }"}'

[steps.headers]
Content-Type = "application/json"

# ── Step 2 — transform : première langue officielle ───────────────────────────
# {{languages}} = '[{"name":"French"},{"name":"German"},…]'  (JSON sérialisé)

[[steps]]
name = "Langue officielle"
kind = "transform"
transforms = [
  { type = "regex", input = "{{languages}}", pattern = "\"name\":\"([^\"]+)\"", group = 1, output = "primary_language" },
]

# ── Step 3 — géocodage de la capitale ─────────────────────────────────────────

[[steps]]
name   = "Géocode capitale"
method = "GET"
url    = "https://geocoding-api.open-meteo.com/v1/search?name={{capital}}&count=1&language=en&format=json"

assert = [
  { on = "status",       eq     = 200  },
  { on = "body.results", exists = true },
]

[steps.extract]
lat     = "results.0.latitude"
lon     = "results.0.longitude"

# ── Step 4 — météo actuelle à la capitale ─────────────────────────────────────
# Utilise {{lat}} et {{lon}} extraits à l'étape précédente.
# weather_code : codes WMO (0=ciel clair, 1-3=nuages, 45-48=brouillard,
#                51-67=pluie, 71-77=neige, 80-82=averses, 95-99=orage)

[[steps]]
name   = "Météo capitale"
method = "GET"
url    = "https://api.open-meteo.com/v1/forecast?latitude={{lat}}&longitude={{lon}}&current=temperature_2m,weather_code,wind_speed_10m&timezone=auto&format=json"

assert = [{ on = "status", eq = 200 }]

[steps.extract]
temperature  = "current.temperature_2m"
wind_speed   = "current.wind_speed_10m"
weather_code = "current.weather_code"

# ── Sortie ────────────────────────────────────────────────────────────────────

[[outputs]]
from_step    = "Météo capitale"
path         = "examples/eu_capitals_weather.json"
include_vars = ["code", "name", "capital", "emoji", "primary_language", "lat", "lon"]
