[collection]
name        = "Public GraphQL APIs"
description = "Countries API et Rick & Morty — publics, sans auth"

# Toutes les requêtes GraphQL sont des POST avec :
#   Content-Type: application/json
#   body: {"query": "..."}

# ── Countries (trevorblades) ──────────────────────────────────────────────────
# API GraphQL stable : pays, continents, langues.

[[folders]]
name = "Countries API"

[[folders.requests]]
name   = "Tous les pays"
method = "POST"
url    = "https://countries.trevorblades.com/graphql"
body   = '{"query": "{ countries { name code capital emoji } }"}'

[folders.requests.headers]
Content-Type = "application/json"

[[folders.requests]]
name   = "Détail France"
method = "POST"
url    = "https://countries.trevorblades.com/graphql"
body   = '{"query": "{ country(code: \"FR\") { name capital currency emoji languages { name } } }"}'

[folders.requests.headers]
Content-Type = "application/json"

[[folders.requests]]
name   = "Liste des continents"
method = "POST"
url    = "https://countries.trevorblades.com/graphql"
body   = '{"query": "{ continents { name code countries { name } } }"}'

[folders.requests.headers]
Content-Type = "application/json"

[[folders.requests]]
name   = "Pays d'Europe"
method = "POST"
url    = "https://countries.trevorblades.com/graphql"
body   = '{"query": "{ continent(code: \"EU\") { name countries { name code capital } } }"}'

[folders.requests.headers]
Content-Type = "application/json"

[[folders.requests]]
name   = "Introspection schema"
method = "POST"
url    = "https://countries.trevorblades.com/graphql"
body   = '{"query": "{ __schema { types { name kind } } }"}'

[folders.requests.headers]
Content-Type = "application/json"

# ── Rick & Morty ──────────────────────────────────────────────────────────────
# API GraphQL bien documentée : personnages, épisodes, lieux.

[[folders]]
name = "Rick & Morty"

[[folders.requests]]
name   = "Liste des personnages"
method = "POST"
url    = "https://rickandmortyapi.com/graphql"
body   = '{"query": "{ characters { results { id name status species image } } }"}'

[folders.requests.headers]
Content-Type = "application/json"

[[folders.requests]]
name   = "Rick Sanchez (id: 1)"
method = "POST"
url    = "https://rickandmortyapi.com/graphql"
body   = '{"query": "{ character(id: 1) { id name status species gender origin { name } location { name } image } }"}'

[folders.requests.headers]
Content-Type = "application/json"

[[folders.requests]]
name   = "Humains vivants"
method = "POST"
url    = "https://rickandmortyapi.com/graphql"
body   = '{"query": "{ characters(filter: { status: \"alive\", species: \"Human\" }) { info { count pages } results { name origin { name } } } }"}'

[folders.requests.headers]
Content-Type = "application/json"

[[folders.requests]]
name   = "Épisodes (page 1)"
method = "POST"
url    = "https://rickandmortyapi.com/graphql"
body   = '{"query": "{ episodes { results { id name air_date episode } } }"}'

[folders.requests.headers]
Content-Type = "application/json"

[[folders.requests]]
name   = "Lieux"
method = "POST"
url    = "https://rickandmortyapi.com/graphql"
body   = '{"query": "{ locations { results { id name type dimension residents { name } } } }"}'

[folders.requests.headers]
Content-Type = "application/json"

[[folders.requests]]
name   = "Introspection schema"
method = "POST"
url    = "https://rickandmortyapi.com/graphql"
body   = '{"query": "{ __schema { queryType { name } types { name kind description } } }"}'

[folders.requests.headers]
Content-Type = "application/json"
